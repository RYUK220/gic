const CATS = [...new Set(ALL.map(c=>c.cat))];
let filtered=[...ALL], cur=0, got=0, nope=0, flipped=false;
 

ALL.forEach((c, i) => c.id = i);
  let wrongSet = new Set(JSON.parse(localStorage.getItem("wrongSet")) || []);

function buildFilters(){
  const fr=document.getElementById('filters');
  const makeBtn=(label,val)=>{
    const b=document.createElement('button');
    b.className='fb'+(val==='all'?' active':'');
    b.textContent=label;
    b.onclick=()=>setFilter(val,b);
    fr.appendChild(b);
  };
  makeBtn('All','all');
  const labels={'disproportionation':'Disprop','hydrolysis-halogens':'Halogens','hydrolysis-noble':'Noble gases','hydrolysis-oxyhalides':'Oxy halides','hydrolysis-S/Se/Te':'S/Se/Te','hydrolysis-N/P':'N/P group','hydrolysis-C/Si':'C/Si group','hydrolysis-boron':'Boron','metal-oxides':'Metal oxides','heating-carbonates':'Carbonates','heating-nitrates':'Nitrates','heating-sulphates':'Sulphates','heating-oxalates':'Oxalates','heating-oxides':'Oxide decomp','heating-NH4':'NHâ‚„ salts','heating-azides':'Azides','heating-acids':'Acid heating','heating-salts':'Salt heating','internal-hydrolysis':'Internal hydrolysis','redox':'Redox agents','misc':'Amphoteric','dehydration':'Conc Hâ‚‚SOâ‚„','acid-strength':'Acid strength'};
  CATS.forEach(c=>makeBtn(labels[c]||c,c));
}

function setFilter(val,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filtered=val==='all'?[...ALL]:ALL.filter(c=>c.cat===val);
  restart();
}

function render(){
  if(cur>=filtered.length){showDone();return;}
  const c=filtered[cur];
  const fc=document.getElementById('f-cat');
  fc.textContent=c.cat.replace(/-/g,' ');
  fc.className='cat-badge '+c.cl;
  document.getElementById('f-main').textContent=c.f;
  document.getElementById('f-sub').textContent=c.fs||'';
  document.getElementById('b-main').textContent=c.b;
  document.getElementById('b-sub').textContent=c.bs||'';
  document.getElementById('b-note').textContent=c.n||'';
  document.getElementById('b-note').style.display=c.n?'block':'none';
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('btn-row').style.display='none';
  document.getElementById('flip-btn').style.display='block';
  document.getElementById('done').style.display='none';
  document.querySelector('.card-area').style.display='block';
  updateStats();
  flipped=false;
}

function flip(){
  if(flipped)return;
  flipped=true;
  document.getElementById('card-inner').classList.add('flipped');
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('flip-btn').style.display='none';
}

function next(g){
  const currentCard = filtered[cur].id;

  if(g){
    got++;
    wrongSet.delete(currentCard);
  } else {
    nope++;
    wrongSet.add(currentCard);
  }

  localStorage.setItem("wrongSet", JSON.stringify([...wrongSet]));

  cur++;
  render();
}

 function showWrong(){
  const saved = JSON.parse(localStorage.getItem("wrongSet")) || [];
  filtered = ALL.filter(c => saved.includes(c.id));
  restart();
 }
 
function updateStats(){
  const left=filtered.length-cur;
  document.getElementById('s-got').textContent='Got: '+got;
  document.getElementById('s-nope').textContent='Practice: '+nope;
  document.getElementById('s-left').textContent='Left: '+left;
  const pct=filtered.length>0?Math.round((cur/filtered.length)*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=(Math.min(cur+1,filtered.length))+' / '+filtered.length;
}

function showDone(){
  document.querySelector('.card-area').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('flip-btn').style.display='none';
  document.getElementById('done').style.display='block';
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-text').textContent=filtered.length+' / '+filtered.length;
  const pct=filtered.length>0?Math.round((got/filtered.length)*100):0;
  document.getElementById('done-title').textContent=pct>=80?'Solid! '+got+'/'+filtered.length+' correct':'Keep grinding â€” '+got+'/'+filtered.length;
  document.getElementById('done-sub').textContent=pct>=80?'Great retention. Move to the next category.':'Review the ones you missed and run the deck again.';
}

function restart(){cur=0;got=0;nope=0;flipped=false;document.getElementById('done').style.display='none';document.querySelector('.card-area').style.display='block';render();}

buildFilters();
render();
</script>
</body>
</html>
